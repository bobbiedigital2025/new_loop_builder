
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoDiGi Earn & Learn Builder</title>
    <!--
      GitHub Pages SPA redirect handler.
      When 404.html encodes a deep-link path as a query string this script
      decodes it and replaces the browser history entry so React Router sees
      the correct URL.
      See public/404.html for the companion redirect script.
    -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded.slice(1).length ? '?' + decoded.slice(1).join('&') : '') +
            l.hash
          );
        }
      }(window.location));
    </script>
    <meta name="description" content="Gamify user engagement with a learning journey that rewards app interactions and promotes subscriptions." />
    <link rel="icon" type="image/svg+xml" href="/placeholder.svg" />

    <meta property="og:title" content="BoDiGi Earn & Learn Builder" />
    <meta property="og:description" content="Gamify user engagement with a learning journey that rewards app interactions and promotes subscriptions." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/og.jpg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
